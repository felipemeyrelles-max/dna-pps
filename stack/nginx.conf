server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # ---------- security headers (always) ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- Meta CAPI endpoint → php-fpm sidecar ----------
    location = /api/capi {
        # forward client IP pra capi.php pegar via X-Forwarded-For
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/api/capi.php;
        fastcgi_param SCRIPT_NAME /api/capi;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_USER_AGENT $http_user_agent;
        fastcgi_param HTTP_CONTENT_TYPE $content_type;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    # ---------- cache: /assets/* long-term immutable ----------
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ---------- favicon long cache ----------
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ---------- other static at root (legacy) ----------
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|otf|css|js|pdf|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ---------- HTML: never cache ----------
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ---------- SPA-ish fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
