version: '3.8'

services:
  web:
    image: nginx:alpine
    volumes:
      - /opt/dna-pps/site:/usr/share/nginx/html:ro
      - /opt/dna-pps/stack/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - network_swarm_public
      - capi_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_swarm_public"
        - "traefik.http.routers.dnapps.rule=Host(`ppsdna.com.br`) || Host(`www.ppsdna.com.br`)"
        - "traefik.http.routers.dnapps.entrypoints=websecure"
        - "traefik.http.routers.dnapps.tls=true"
        - "traefik.http.routers.dnapps.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.dnapps.service=dnapps"
        - "traefik.http.services.dnapps.loadbalancer.server.port=80"
        # HTTP -> HTTPS redirect
        - "traefik.http.routers.dnapps-http.rule=Host(`ppsdna.com.br`) || Host(`www.ppsdna.com.br`)"
        - "traefik.http.routers.dnapps-http.entrypoints=web"
        - "traefik.http.routers.dnapps-http.middlewares=dnapps-redirect"
        - "traefik.http.middlewares.dnapps-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.dnapps-redirect.redirectscheme.permanent=true"
        # www -> apex redirect
        - "traefik.http.middlewares.dnapps-www.redirectregex.regex=^https://www\\.ppsdna\\.com\\.br/(.*)"
        - "traefik.http.middlewares.dnapps-www.redirectregex.replacement=https://ppsdna.com.br/$$1"
        - "traefik.http.middlewares.dnapps-www.redirectregex.permanent=true"

  php:
    image: php:8.3-fpm-alpine
    volumes:
      - /opt/dna-pps/api:/var/www/api:ro
    env_file:
      - /opt/dna-pps/stack/capi.env
    networks:
      - capi_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  network_swarm_public:
    external: true
  capi_internal:
    driver: overlay
    attachable: false
